name: Release

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  release:
    name: Release Linux x86_64 plugin
    runs-on: ubuntu-22.04

    env:
      RUST_TOOLCHAIN: 1.75.0
      RUST_TARGET: x86_64-unknown-linux-gnu
      ARTIFACT_NAME: suricatax80-ndpi5-plugin-linux-x86_64
      ARTIFACT_FILE: ndpi.so

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends build-essential zip

      - name: Install Rust toolchain
        run: |
          rustup toolchain install "$RUST_TOOLCHAIN" --profile minimal --target "$RUST_TARGET"
          rustup default "$RUST_TOOLCHAIN"

      - name: Verify build platform
        run: |
          test "$(uname -s)" = "Linux"
          test "$(uname -m)" = "x86_64"

      - name: Build plugin
        run: cargo build --release --locked --target "$RUST_TARGET"

      - name: Stage release files
        run: |
          mkdir -p dist
          cp "target/$RUST_TARGET/release/libndpi.so" "dist/$ARTIFACT_FILE"
          cd dist
          sha256sum "$ARTIFACT_FILE" > SHA256SUMS
          zip -9 "$ARTIFACT_NAME.zip" "$ARTIFACT_FILE" SHA256SUMS
          ls -l

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            dist/${{ env.ARTIFACT_NAME }}.zip
            dist/SHA256SUMS
